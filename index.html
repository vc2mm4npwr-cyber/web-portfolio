<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Web Portfolio</h1>
        </div>
    </header>

    <main>

        <section class="hero">
            <div class="container">
                <h2 class="hero-copy">
                    丁寧に、誠実に。<br>
                    心地よいWeb制作を。
                </h2>
                <a href="#Works" class="btn">Worksを見る</a>
            </div>
        </section>

        <section id="works" class="section">
            <div class="container">
                <h2>Works</h2>

                <div class="works-grid">

                    <div class="work-card">
                        
                        <img src="images/cafe.jpg" alt="Cafe de ReposのLPトップ画面">

                        <h3>Cafe de Repos</h3>
                        <p>架空のカフェのLP制作。余白設計と自然な動きを意識。</p>
                    
                        <div class="work-links">
                            <a href="https://vc2mm4npwr-cyber.github.io/cafe-repos/" target="_blank" class="btn">デモ</a>
                            <a href="https://github.com/vc2mm4npwr-cyber/cafe-repos" target="_blank" class="btn btn-outline">GitHub</a>
                        </div>
                
                    </div>
                

                    <div class="work-card">
                        
                        <img src="images/faq.jpg" alt="JavaScriptで実践したハンバーガーメニューとFAQアコーディオンの画面">
                        <h3>FAQ UI</h3>
                        <p>JavaScriptを用いたUI実装。</p>
                
                        <div class="work-links">
                            <a href="https://vc2mm4npwr-cyber.github.io/faq-js/" target="_blank" class="btn">デモ</a>
                            <a href="https://github.com/vc2mm4npwr-cyber/faq-js" target="_blank" class="btn btn-outline">GitHub</a>
                        </div>

                    </div>
                
                </div>

            </div>
        </section>

    </main>

</body>
</html>
